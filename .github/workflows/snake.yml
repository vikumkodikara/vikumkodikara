name: Generate Snake

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: vikumkodikara
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake.gif
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00FF41&color_dots=#0d1117,#003b00,#006400,#00aa00,#00FF41
            dist/github-snake-light.svg?palette=github-light&color_snake=#008f11&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
